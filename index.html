  });
}

async function geocode(site) {
  // Si le site est déjà géocodé (données utilisateur), retourner direct
  if (site._coords) return site._coords;
  // 1ère tentative : par CP
  try {
    const r = await fetch(`https://geo.api.gouv.fr/communes?codePostal=${site.cp}&fields=centre,nom&format=json`);
    const arr = await r.json();
    if (Array.isArray(arr) && arr.length > 0) {
      // chercher meilleur match sur le nom
      const norm = s => s.toLowerCase().replace(/[''`-]/g,' ').replace(/\s+/g,' ').trim()
        .normalize('NFD').replace(/[̀-ͯ]/g,'');
      const target = norm(site.commune);
      let best = arr[0];
      let bestScore = -1;
      for (const c of arr) {
        const n = norm(c.nom);
        let score = 0;
        if (n === target) score = 100;
        else if (n.includes(target) || target.includes(n)) score = 50;
        else {
          // overlap simple
          const a = new Set(n.split(' '));
          const b = new Set(target.split(' '));
          a.forEach(w => { if (b.has(w)) score += 5; });
        }
        if (score > bestScore) { bestScore = score; best = c; }
      }
      if (best.centre) return best.centre.coordinates; // [lng, lat]
    }
  } catch(e) {}
  // 2ème tentative : par nom
  try {
    const r = await fetch(`https://geo.api.gouv.fr/communes?nom=${encodeURIComponent(site.commune)}&fields=centre,nom&format=json&limit=5`);
    const arr = await r.json();
    if (Array.isArray(arr) && arr.length > 0 && arr[0].centre) {
      return arr[0].centre.coordinates;
    }
  } catch(e) {}
  return null;
}

async function processList(sites, cluster) {
  const batchSize = 10;
  const markers = [];
  for (let i = 0; i < sites.length; i += batchSize) {
    const batch = sites.slice(i, i + batchSize);
    const results = await Promise.all(batch.map(async s => {
      const coords = await geocode(s);
      return { site: s, coords };
    }));
    for (const { site, coords } of results) {
      if (coords) {
        const [lng, lat] = coords;
        const color = colorByCoopType[`${site.coop}-${site.type}`] || '#888';
        const m = L.marker([lat, lng], { icon: makeIcon(color) });
        const lines = [`<div class="popup-title">${site.coop} — ${site.commune} (${site.cp})</div>`];
        if (site.adresse) lines.push(`<div class="popup-meta">${site.adresse}</div>`);
        if (site.nom) lines.push(`<div class="popup-meta"><i>${site.nom}</i></div>`);
        if (site.tel) lines.push(`<div class="popup-meta">📞 ${site.tel}</div>`);
        if (site.rs && site.rs !== "Noriap") lines.push(`<div class="popup-meta">RS : ${site.rs}</div>`);
        lines.push(`<div class="popup-meta">Dép. ${site.dep} — NAF ${site.naf} — ${site.type}</div>`);
        if (site.notes) lines.push(`<div class="popup-notes">${site.notes}</div>`);
        if (site._score !== undefined && site._score < 0.5) lines.push(`<div class="popup-notes" style="color:#c60">⚠ position approx. (centroïde commune)</div>`);
        m.bindPopup(lines.join(""));
        cluster.addLayer(m);
        markers.push(m);
        done++;
      } else {
        failed++;
        console.warn('Échec géocodage', site);
      }
      statusEl.textContent = `${done}/${total} géocodés` + (failed ? ` (${failed} échecs)` : '');
    }
  }
  return markers;
}

function drawBuffers(markers, color, target) {
  for (const m of markers) {
    const { lat, lng } = m.getLatLng();
    L.circle([lat, lng], {
      radius: 7000,
      color: color,
      weight: 1,
      fillColor: color,
      fillOpacity: 0.15,
      opacity: 0.5,
      interactive: false
    }).addTo(target);
  }
}

function computeUnion(markers) {
  if (markers.length === 0) return null;
  const polys = markers.map(m => {
    const { lat, lng } = m.getLatLng();
    return turf.buffer(turf.point([lng, lat]), 7, { units: 'kilometers', steps: 24 });
  });
  // Union itérative, robuste aux erreurs ponctuelles
  let u = polys[0];
  for (let i = 1; i < polys.length; i++) {
    try {
      const merged = turf.union(u, polys[i]);
      if (merged) u = merged;
    } catch(e) {
      console.warn('union step failed', i, e);
    }
  }
  return u;
}

async function run() {
  const [unealMarkers, noriapMarkers] = await Promise.all([
    processList(uneal, clusterUneal),
    processList(noriapFinal, clusterNoriap)
  ]);
  map.addLayer(clusterUneal);
  map.addLayer(clusterNoriap);

  const all = [...unealMarkers, ...noriapMarkers];
  if (all.length > 0) {
    const group = L.featureGroup(all);
    map.fitBounds(group.getBounds().pad(0.05));
  }

  statusEl.textContent = `Unéal: ${unealMarkers.length} • Noriap: ${noriapMarkers.length} — calcul des buffers…`;

  // Cercles individuels (rapide)
  drawBuffers(unealMarkers, '#2ca02c', buffersUneal);
  drawBuffers(noriapMarkers, '#e60026', buffersNoriap);

  // Union + intersection (turf.js) — plus lourd, lancé en différé
  setTimeout(() => {
    try {
      const t0 = performance.now();
      const unealU = computeUnion(unealMarkers);
      const noriapU = computeUnion(noriapMarkers);
      let overlap = null;
      if (unealU && noriapU) {
        try { overlap = turf.intersect(unealU, noriapU); }
        catch(e) { console.warn('intersect failed', e); }
      }
      if (overlap) {
        L.geoJSON(overlap, {
          style: {
            color: '#ff8c00',
            weight: 2,
            fillColor: '#ff8c00',
            fillOpacity: 0.55
          }
        }).addTo(overlapLayer);
        map.addLayer(overlapLayer);
        // Surface approximative
        const km2 = turf.area(overlap) / 1e6;
        const dt = ((performance.now() - t0) / 1000).toFixed(1);
        statusEl.textContent = `Unéal: ${unealMarkers.length} • Noriap: ${noriapMarkers.length} • Chevauchement: ${km2.toFixed(0)} km² (calc ${dt}s)`;
      } else {
        statusEl.textContent = `Unéal: ${unealMarkers.length} • Noriap: ${noriapMarkers.length} — pas de chevauchement détecté`;
      }
    } catch(e) {
      console.error(e);
      statusEl.textContent = `Erreur calcul chevauchement (voir console)`;
    }
  }, 100);
}

run();
</script>
